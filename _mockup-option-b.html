<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option B — Typewriter · House of Navi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #280800;
      font-family: 'Baloo 2', sans-serif;
      color: #F5DDD5;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-image: url('brand/assets/textures/texture-terracotta.png');
      background-size: cover;
      background-position: center;
    }
    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(20, 4, 0, 0.58);
      mix-blend-mode: multiply;
    }
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 90% 70% at 50% 50%, transparent 30%, rgba(15,4,0,0.62) 100%);
      mix-blend-mode: multiply;
    }

    /* ── State 1: HOUSE OF NAVI ── */
    .state-1 {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 0 clamp(40px, 7vw, 110px);
      transition: opacity 0.9s ease;
    }

    .state-1__wordmark {
      font-family: 'Lilita One', cursive;
      font-size: clamp(80px, 12vw, 168px);
      line-height: 0.88;
      letter-spacing: -0.02em;
      color: #F5DDD5;
      text-transform: uppercase;
    }

    .state-1__tagline {
      margin-top: clamp(28px, 4vw, 44px);
      font-family: 'Baloo 2', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #F5DDD5;
      opacity: 0.5;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .state-1__tagline::before,
    .state-1__tagline::after {
      content: '';
      display: block;
      width: 48px;
      height: 1px;
      background: rgba(245, 221, 213, 0.3);
    }

    /* ── State 2: Typewriter headline ── */
    .state-2 {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 0 clamp(40px, 7vw, 110px);
      opacity: 0;
    }

    .state-2__headline {
      font-family: 'Lilita One', cursive;
      font-size: clamp(44px, 5.8vw, 84px);
      line-height: 1.0;
      letter-spacing: -0.02em;
      color: #F5DDD5;
      max-width: 820px;
      min-height: 2.2em;
    }

    /* Blinking cursor */
    .cursor {
      display: inline-block;
      width: 3px;
      height: 0.9em;
      background: rgba(245, 221, 213, 0.7);
      margin-left: 2px;
      vertical-align: baseline;
      position: relative;
      top: 0.06em;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .state-2__tagline {
      margin-top: clamp(28px, 4vw, 44px);
      font-family: 'Baloo 2', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #F5DDD5;
      opacity: 0;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: opacity 0.8s ease 0.3s;
    }
    .state-2__tagline::before,
    .state-2__tagline::after {
      content: '';
      display: block;
      width: 48px;
      height: 1px;
      background: rgba(245, 221, 213, 0.3);
    }
    .state-2__tagline.show { opacity: 0.5; }

    /* ── Labels ── */
    .demo-label {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Baloo 2', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(245, 221, 213, 0.4);
      z-index: 50;
    }

    .demo-countdown {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Baloo 2', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(245, 221, 213, 0.35);
      z-index: 50;
    }

    .replay-btn {
      position: fixed;
      bottom: 36px;
      right: 36px;
      font-family: 'Baloo 2', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(245, 221, 213, 0.5);
      background: none;
      border: 1px solid rgba(245, 221, 213, 0.25);
      padding: 10px 20px;
      cursor: pointer;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.4s, color 0.2s, border-color 0.2s;
    }
    .replay-btn:hover {
      color: #F5DDD5;
      border-color: rgba(245, 221, 213, 0.6);
    }
    .replay-btn.visible { opacity: 1; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="scrim"></div>
  <div class="vignette"></div>

  <p class="demo-label">Option B — Typewriter reveal</p>

  <div class="state-1" id="state1">
    <h1 class="state-1__wordmark">House<br>of Navi</h1>
    <p class="state-1__tagline">Making hope visible.</p>
  </div>

  <div class="state-2" id="state2">
    <h2 class="state-2__headline" id="typeTarget"><span class="cursor"></span></h2>
    <p class="state-2__tagline" id="tagline2">Making hope visible.</p>
  </div>

  <p class="demo-countdown" id="countdown">Typing in 3s…</p>
  <button class="replay-btn" id="replayBtn">↺ Replay</button>

  <script>
    var s1 = document.getElementById('state1');
    var s2 = document.getElementById('state2');
    var target = document.getElementById('typeTarget');
    var tagline2 = document.getElementById('tagline2');
    var cd = document.getElementById('countdown');
    var rb = document.getElementById('replayBtn');

    var text = 'The world does not need more noise. It needs deeper connection.';
    var typingInterval = null;
    var countInterval = null;

    function reset() {
      s1.style.opacity = '1';
      s2.style.opacity = '0';
      tagline2.classList.remove('show');
      target.innerHTML = '<span class="cursor"></span>';
      rb.classList.remove('visible');
      cd.style.opacity = '1';
    }

    function run() {
      reset();

      var secs = 3;
      cd.textContent = 'Typing in ' + secs + 's…';

      countInterval = setInterval(function() {
        secs--;
        if (secs > 0) {
          cd.textContent = 'Typing in ' + secs + 's…';
        } else {
          clearInterval(countInterval);
          cd.style.opacity = '0';

          /* Fade out State 1 */
          s1.style.opacity = '0';

          /* Show State 2 immediately (empty) so it takes up space */
          setTimeout(function() {
            s2.style.opacity = '1';
            typeText();
          }, 500);
        }
      }, 1000);
    }

    function typeText() {
      var i = 0;
      var delay = 28; /* ms per character — adjust for pace */

      typingInterval = setInterval(function() {
        if (i <= text.length) {
          target.innerHTML = text.slice(0, i) + '<span class="cursor"></span>';
          i++;
        } else {
          clearInterval(typingInterval);
          /* Remove cursor after a beat */
          setTimeout(function() {
            target.textContent = text;
            tagline2.classList.add('show');
            setTimeout(function() { rb.classList.add('visible'); }, 600);
          }, 800);
        }
      }, delay);
    }

    run();
    rb.addEventListener('click', function() {
      clearInterval(typingInterval);
      clearInterval(countInterval);
      run();
    });
  </script>
</body>
</html>

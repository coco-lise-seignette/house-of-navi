<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option A — Cross-dissolve · House of Navi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #280800;
      font-family: 'Baloo 2', sans-serif;
      color: #F5DDD5;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-image: url('brand/assets/textures/texture-terracotta.png');
      background-size: cover;
      background-position: center;
    }
    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(20, 4, 0, 0.58);
      mix-blend-mode: multiply;
    }
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 90% 70% at 50% 50%, transparent 30%, rgba(15,4,0,0.62) 100%);
      mix-blend-mode: multiply;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 0 clamp(40px, 7vw, 110px);
    }

    /* ── State 1: HOUSE OF NAVI ── */
    .state-1 {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 0 clamp(40px, 7vw, 110px);
      transition: opacity 1.2s ease;
    }

    .state-1__wordmark {
      font-family: 'Lilita One', cursive;
      font-size: clamp(80px, 12vw, 168px);
      line-height: 0.88;
      letter-spacing: -0.02em;
      color: #F5DDD5;
      text-transform: uppercase;
    }

    .state-1__tagline {
      margin-top: clamp(28px, 4vw, 44px);
      font-family: 'Baloo 2', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #F5DDD5;
      opacity: 0.5;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .state-1__tagline::before,
    .state-1__tagline::after {
      content: '';
      display: block;
      width: 48px;
      height: 1px;
      background: rgba(245, 221, 213, 0.3);
    }

    /* ── State 2: Headline ── */
    .state-2 {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 0 clamp(40px, 7vw, 110px);
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .state-2__headline {
      font-family: 'Lilita One', cursive;
      font-size: clamp(44px, 5.8vw, 84px);
      line-height: 1.0;
      letter-spacing: -0.02em;
      color: #F5DDD5;
      max-width: 820px;
    }

    .state-2__tagline {
      margin-top: clamp(28px, 4vw, 44px);
      font-family: 'Baloo 2', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #F5DDD5;
      opacity: 0.5;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .state-2__tagline::before,
    .state-2__tagline::after {
      content: '';
      display: block;
      width: 48px;
      height: 1px;
      background: rgba(245, 221, 213, 0.3);
    }

    /* ── Label ── */
    .demo-label {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Baloo 2', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(245, 221, 213, 0.4);
      z-index: 50;
    }

    .demo-countdown {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Baloo 2', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(245, 221, 213, 0.35);
      z-index: 50;
    }

    .replay-btn {
      position: fixed;
      bottom: 36px;
      right: 36px;
      font-family: 'Baloo 2', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(245, 221, 213, 0.5);
      background: none;
      border: 1px solid rgba(245, 221, 213, 0.25);
      padding: 10px 20px;
      cursor: pointer;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.4s, color 0.2s, border-color 0.2s;
    }
    .replay-btn:hover {
      color: #F5DDD5;
      border-color: rgba(245, 221, 213, 0.6);
    }
    .replay-btn.visible { opacity: 1; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="scrim"></div>
  <div class="vignette"></div>

  <p class="demo-label">Option A — Cross-dissolve</p>

  <div class="state-1" id="state1">
    <h1 class="state-1__wordmark">House<br>of Navi</h1>
    <p class="state-1__tagline">Making hope visible.</p>
  </div>

  <div class="state-2" id="state2">
    <h2 class="state-2__headline">The world does not need more noise. It needs deeper connection.</h2>
    <p class="state-2__tagline">Making hope visible.</p>
  </div>

  <p class="demo-countdown" id="countdown">Transitioning in 3s…</p>
  <button class="replay-btn" id="replayBtn">↺ Replay</button>

  <script>
    var s1 = document.getElementById('state1');
    var s2 = document.getElementById('state2');
    var cd = document.getElementById('countdown');
    var rb = document.getElementById('replayBtn');

    function run() {
      s1.style.opacity = '1';
      s2.style.opacity = '0';
      rb.classList.remove('visible');
      cd.style.opacity = '1';

      var secs = 3;
      cd.textContent = 'Transitioning in ' + secs + 's…';
      var interval = setInterval(function() {
        secs--;
        if (secs > 0) {
          cd.textContent = 'Transitioning in ' + secs + 's…';
        } else {
          clearInterval(interval);
          cd.style.opacity = '0';
          s1.style.opacity = '0';
          s2.style.opacity = '1';
          setTimeout(function() { rb.classList.add('visible'); }, 1400);
        }
      }, 1000);
    }

    run();
    rb.addEventListener('click', run);
  </script>
</body>
</html>

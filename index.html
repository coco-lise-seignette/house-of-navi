<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House of Navi — A Spotlight, Not a Solution</title>
  <meta name="description" content="House of Navi is a South African non-profit shining a light on invisible communities and environments across Africa. Stories first. Funding follows.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--ff-body);
      background: var(--navi-midnight-dune);
      color: var(--navi-first-light);
    }

    /* ── Grain overlay ── */
    .grain-overlay {
      position: fixed; inset: 0;
      z-index: 50; pointer-events: none;
      opacity: 0.045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ── Landing section ── */
    #landing {
      position: relative;
      width: 100%; height: 100vh;
      background-image: url('brand/assets/textures/texture-terracotta.png');
      background-size: cover; background-position: center;
      display: flex; align-items: center; justify-content: center;
    }
    .section-scrim {
      position: absolute; inset: 0;
      background: rgba(20, 4, 0, 0.55);
      mix-blend-mode: multiply; z-index: 1;
    }
    .section-vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 90% 70% at 50% 50%, transparent 30%, rgba(15,4,0,0.6) 100%);
      mix-blend-mode: multiply; z-index: 1;
    }
    .section-content {
      position: relative; z-index: 10;
      text-align: center;
      padding: 0 clamp(28px, 6vw, 96px);
      max-width: 860px;
    }
    .landing-title {
      font-family: var(--ff-display);
      font-size: clamp(44px, 5.8vw, 84px);
      line-height: 1.0; letter-spacing: -0.02em;
      margin-bottom: clamp(24px, 3vw, 36px);
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
    }
    .landing-tagline {
      display: inline-flex; align-items: center; gap: 20px;
      font-family: var(--ff-body); font-size: var(--fs-cap);
      font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(245, 221, 213, 0.75);
      margin-bottom: clamp(36px, 5vh, 56px);
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.38s forwards;
    }
    .landing-tagline::before,
    .landing-tagline::after {
      content: ''; display: block;
      width: 60px; height: 1px;
      background: rgba(245, 221, 213, 0.22);
    }

    /* ── CTA ── */
    .landing-cta {
      display: flex; align-items: center; justify-content: center;
      gap: clamp(12px, 2vw, 20px);
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.55s forwards;
    }
    .landing-cta__primary {
      display: inline-flex; align-items: center;
      padding: 14px 32px;
      background: var(--navi-clay-cream);
      color: var(--navi-blood-dune);
      font-family: var(--ff-body); font-size: 13px;
      font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      border-radius: 100px;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 6px 24px rgba(40,8,0,0.22);
      min-height: 44px;
    }
    .landing-cta__primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 32px rgba(40,8,0,0.3);
    }
    .landing-cta__secondary {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--ff-body); font-size: 12px;
      font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(245, 221, 213, 0.6);
      text-decoration: none;
      padding: 0 4px;
      min-height: 44px;
      transition: color 0.2s;
    }
    .landing-cta__secondary:hover { color: var(--navi-first-light); }
    .landing-cta__secondary::after { content: '→'; font-size: 14px; }

    .landing-footer {
      position: absolute;
      bottom: clamp(32px, 5vh, 60px);
      left: clamp(28px, 6vw, 72px);
      font-family: var(--ff-body); font-size: 11px;
      font-weight: 600; letter-spacing: 0.24em; text-transform: uppercase;
      color: rgba(245, 221, 213, 0.45);
      z-index: 10;
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .landing-title { font-size: clamp(36px, 10vw, 56px); }
      .landing-tagline { font-size: 10px; letter-spacing: 0.2em; }
      .landing-tagline::before,
      .landing-tagline::after { width: 32px; }
    }
  </style>
</head>
<body>

  <div class="scroll-progress" id="scrollProgress"></div>
  <div class="grain-overlay"></div>

  <!-- ── Nav ── -->
  <nav class="navi-nav" id="nav">
    <div class="navi-nav__left">
      <a href="index.html" class="navi-logo">
        <img src="brand/assets/logos/logo-navi-firstlight.png" alt="House of Navi" height="48">
      </a>
    </div>
    <div class="navi-links">
      <a href="index.html" class="navi-link is-current">Home</a>
      <a href="projects.html" class="navi-link">Projects</a>
      <a href="get-involved.html" class="navi-link">Get Involved</a>
      <a href="about.html" class="navi-link">About</a>
      <a href="contact.html" class="navi-link">Contact</a>
    </div>
    <button class="navi-hamburger" id="naviHamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- ── Mobile menu ── -->
  <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <a href="index.html" class="mobile-menu__link">Home</a>
    <a href="projects.html" class="mobile-menu__link">Projects</a>
    <a href="get-involved.html" class="mobile-menu__link">Get Involved</a>
    <a href="about.html" class="mobile-menu__link">About</a>
    <a href="contact.html" class="mobile-menu__link">Contact</a>
  </div>

  <!-- ── Support pill ── -->
  <a href="get-involved.html#donate" class="navi-pill">
    <span>♥</span> Support
  </a>

  <!-- ── Landing ── -->
  <section id="landing">
    <div class="section-scrim"></div>
    <div class="section-vignette"></div>

    <div class="section-content">
      <h1 class="landing-title">Stories can change the world.</h1>
      <p class="landing-tagline">A spotlight · Not a solution</p>
      <div class="landing-cta">
        <a href="projects.html" class="landing-cta__primary">See our work</a>
        <a href="about.html" class="landing-cta__secondary">Who we are</a>
      </div>
    </div>

    <p class="landing-footer">EST · MMXXIV — SOUTH LUANGWA</p>
  </section>

  <script>
    // Mobile hamburger
    const hamburger  = document.getElementById('naviHamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
      const open = hamburger.classList.toggle('is-open');
      mobileMenu.classList.toggle('is-open', open);
      hamburger.setAttribute('aria-expanded', open);
      mobileMenu.setAttribute('aria-hidden', !open);
      document.body.style.overflow = open ? 'hidden' : '';
    });
    mobileMenu.querySelectorAll('.mobile-menu__link').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('is-open');
        mobileMenu.classList.remove('is-open');
        document.body.style.overflow = '';
      });
    });

    // Scroll progress + nav backdrop
    const progressBar = document.getElementById('scrollProgress');
    const nav = document.getElementById('nav');
    let lastY = 0;
    window.addEventListener('scroll', () => {
      const y = window.scrollY;
      const max = document.documentElement.scrollHeight - window.innerHeight;
      if (progressBar && max > 0) progressBar.style.width = (y / max * 100) + '%';
      if (nav) nav.classList.toggle('is-scrolled', y > 60);
      lastY = y;
    }, { passive: true });
  </script>

</body>
</html>

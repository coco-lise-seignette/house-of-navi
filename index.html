<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House of Navi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Baloo+2:wght@400;500;600;700;800&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ── Tokens ── */
    :root {
      --navi-first-light:        #F5DDD5;
      --navi-clay-cream:         #EDE3D0;
      --navi-blood-dune:         #6B1A0E;
      --navi-midnight-dune:      #280800;
      --navi-warm-sand:          #DDD0B8;
      --navi-mid-dune:           #D9907A;
      --ff-display: 'Lilita One', cursive;
      --ff-body:    'Baloo 2', sans-serif;
      --fs-cap: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--ff-body);
      background: var(--navi-midnight-dune);
      color: var(--navi-first-light);
    }

    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    /* ── Fixed grain overlay ── */
    .grain-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0.045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ── Fixed nav ── */
    .fixed-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: clamp(20px, 3vw, 36px) clamp(28px, 6vw, 72px);
      pointer-events: none;
    }
    .fixed-header > * { pointer-events: auto; }

    .navi-nav {
      display: flex;
      gap: clamp(20px, 2vw, 36px);
    }
    .navi-nav-link {
      font-family: var(--ff-body);
      font-size: var(--fs-cap);
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--navi-first-light);
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .navi-nav-link:hover,
    .navi-nav-link.is-active {
      opacity: 1;
    }
    .navi-nav-link.is-active {
      text-decoration: underline;
      text-underline-offset: 5px;
    }

    /* ── Support pill ── */
    .navi-pill {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: 100px;
      background: var(--navi-clay-cream);
      color: var(--navi-blood-dune);
      font-family: var(--ff-body);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      box-shadow: 0 8px 28px rgba(40, 8, 0, 0.2);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .navi-pill:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 34px rgba(40, 8, 0, 0.28);
    }

    /* ── Landing section ── */
    .page-section {
      position: relative;
      width: 100%;
      height: 100vh;
      background-size: cover;
      background-position: center;
    }

    .section-scrim {
      position: absolute;
      inset: 0;
      background: rgba(20, 4, 0, 0.55);
      mix-blend-mode: multiply;
      z-index: 1;
    }
    .section-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 90% 70% at 50% 50%, transparent 30%, rgba(15,4,0,0.6) 100%);
      mix-blend-mode: multiply;
      z-index: 1;
    }

    .section-content {
      position: relative;
      z-index: 10;
    }

    /* ── Reveal animations ── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .reveal-delay-1 { transition-delay: 0.12s; }
    .reveal-delay-2 { transition-delay: 0.24s; }
    .reveal-delay-3 { transition-delay: 0.36s; }
    .reveal.is-visible { opacity: 1; transform: translateY(0); }

    /* ── Landing ── */
    #landing {
      background-image: url('brand/assets/textures/texture-terracotta.png');
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #landing .section-content {
      text-align: center;
      padding: clamp(80px, 14vh, 140px) clamp(28px, 6vw, 96px);
    }
    .landing-title {
      font-family: var(--ff-display);
      font-size: clamp(44px, 5.8vw, 84px);
      line-height: 1.0;
      letter-spacing: -0.02em;
      margin-bottom: clamp(32px, 4vw, 52px);
    }
    .landing-tagline {
      display: inline-flex;
      align-items: center;
      gap: 20px;
      font-family: var(--ff-body);
      font-size: var(--fs-cap);
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(245, 221, 213, 0.85);
    }
    .landing-tagline::before,
    .landing-tagline::after {
      content: '';
      display: block;
      width: 80px;
      height: 1px;
      background: rgba(245, 221, 213, 0.22);
    }
    .landing-footer {
      position: absolute;
      bottom: clamp(32px, 5vh, 60px);
      left: clamp(28px, 6vw, 72px);
      font-family: var(--ff-body);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(245, 221, 213, 0.5);
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="grain-overlay"></div>

  <header class="fixed-header">
    <a href="index.html" class="navi-logo">
      <img src="brand/assets/logos/logo-navi-firstlight.png" alt="House of Navi" height="48">
    </a>
    <nav class="navi-nav">
      <a href="index.html"        class="navi-nav-link is-active">Landing</a>
      <a href="projects.html"     class="navi-nav-link">Projects</a>
      <a href="get-involved.html" class="navi-nav-link">Get Involved</a>
      <a href="about.html"        class="navi-nav-link">About</a>
      <a href="contact.html"      class="navi-nav-link">Contact</a>
    </nav>
  </header>

  <a href="get-involved.html#donate" class="navi-pill">
    <span>♥</span> Support
  </a>

  <section id="landing" class="page-section">
    <div class="section-scrim"></div>
    <div class="section-vignette"></div>

    <div class="section-content">
      <h1 class="landing-title reveal">Stories can change the world.</h1>
      <p class="landing-tagline reveal reveal-delay-2">Making hope visible</p>
    </div>

    <p class="landing-footer reveal reveal-delay-3">EST · MMXXIV — AFRICA</p>
  </section>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(el => {
        if (el.isIntersecting) el.target.classList.add('is-visible');
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>

</body>
</html>

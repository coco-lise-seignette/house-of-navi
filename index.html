<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House of Navi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Baloo+2:wght@400;500;600;700;800&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ── Tokens ── */
    :root {
      --navi-first-light:        #F5DDD5;
      --navi-clay-cream:         #EDE3D0;
      --navi-blood-dune:         #6B1A0E;
      --navi-midnight-dune:      #280800;
      --navi-warm-sand:          #DDD0B8;
      --navi-mid-dune:           #D9907A;
      --ff-display: 'Lilita One', cursive;
      --ff-body:    'Baloo 2', sans-serif;
      --fs-cap: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--ff-body);
      background: var(--navi-midnight-dune);
      color: var(--navi-first-light);
    }

    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    /* ── Fixed grain overlay ── */
    .grain-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0.045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ── Fixed nav ── */
    .fixed-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: clamp(20px, 3vw, 36px) clamp(28px, 6vw, 72px);
      pointer-events: none;
    }
    .fixed-header > * { pointer-events: auto; }

    .navi-nav {
      display: flex;
      gap: clamp(20px, 2vw, 36px);
    }
    .navi-nav-link {
      font-family: var(--ff-body);
      font-size: var(--fs-cap);
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--navi-first-light);
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .navi-nav-link:hover,
    .navi-nav-link.is-active {
      opacity: 1;
    }
    .navi-nav-link.is-active {
      text-decoration: underline;
      text-underline-offset: 5px;
    }

    /* ── Support pill ── */
    .navi-pill {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: 100px;
      background: var(--navi-clay-cream);
      color: var(--navi-blood-dune);
      font-family: var(--ff-body);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      box-shadow: 0 8px 28px rgba(40, 8, 0, 0.2);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .navi-pill:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 34px rgba(40, 8, 0, 0.28);
    }

    /* ── Landing section ── */
    .page-section {
      position: relative;
      width: 100%;
      height: 100vh;
      background-size: cover;
      background-position: center;
    }

    .section-scrim {
      position: absolute;
      inset: 0;
      background: rgba(20, 4, 0, 0.55);
      mix-blend-mode: multiply;
      z-index: 1;
    }
    .section-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 90% 70% at 50% 50%, transparent 30%, rgba(15,4,0,0.6) 100%);
      mix-blend-mode: multiply;
      z-index: 1;
    }

    .section-content {
      position: relative;
      z-index: 10;
    }

    /* ── Reveal animations ── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .reveal-delay-1 { transition-delay: 0.12s; }
    .reveal-delay-2 { transition-delay: 0.24s; }
    .reveal-delay-3 { transition-delay: 0.36s; }
    .reveal.is-visible { opacity: 1; transform: translateY(0); }

    /* ── Landing ── */
    #landing {
      background-image: url('brand/assets/textures/texture-terracotta.png');
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #landing .section-content {
      text-align: center;
      padding: clamp(80px, 14vh, 140px) clamp(28px, 6vw, 96px);
    }
    .landing-title {
      font-family: var(--ff-display);
      font-size: clamp(44px, 5.8vw, 84px);
      line-height: 1.0;
      letter-spacing: -0.02em;
      margin-bottom: clamp(32px, 4vw, 52px);
    }
    .landing-tagline {
      display: inline-flex;
      align-items: center;
      gap: 20px;
      font-family: var(--ff-body);
      font-size: var(--fs-cap);
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(245, 221, 213, 0.85);
    }
    .landing-tagline::before,
    .landing-tagline::after {
      content: '';
      display: block;
      width: 80px;
      height: 1px;
      background: rgba(245, 221, 213, 0.22);
    }
    .landing-footer {
      position: absolute;
      bottom: clamp(32px, 5vh, 60px);
      left: clamp(28px, 6vw, 72px);
      font-family: var(--ff-body);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(245, 221, 213, 0.5);
      z-index: 10;
    }

    /* ── New nav (overrides old rules) ── */
    .navi-nav {
      position: fixed !important;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex !important;
      justify-content: space-between;
      align-items: center;
      padding: clamp(20px, 3vh, 28px) clamp(24px, 5vw, 64px);
      transition: transform 0.3s ease, background 0.3s ease;
      gap: 0 !important;
    }
    .navi-nav.nav-hidden { transform: translateY(-100%); }
    .navi-nav.is-scrolled {
      background: rgba(8, 2, 0, 0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .navi-nav__left { display: flex; align-items: center; }
    .navi-links {
      display: flex;
      gap: clamp(20px, 2vw, 36px);
      align-items: center;
    }
    .navi-link {
      font-family: var(--ff-body, 'Baloo 2', sans-serif);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #F5DDD5;
      opacity: 0.55;
      transition: opacity 0.2s;
      text-decoration: none;
    }
    .navi-link:hover { opacity: 1; }
    .navi-link.is-current { opacity: 1; text-decoration: underline; text-underline-offset: 5px; }
    .navi-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }
    .navi-hamburger span {
      display: block; width: 22px; height: 1.5px;
      background: #F5DDD5;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }
    .navi-hamburger.is-open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .navi-hamburger.is-open span:nth-child(2) { opacity: 0; }
    .navi-hamburger.is-open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
    .mobile-menu {
      position: fixed; inset: 0; z-index: 90;
      background: rgba(10,2,0,0.97);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .mobile-menu.is-open { opacity: 1; pointer-events: all; }
    .mobile-menu__link {
      font-family: var(--ff-display, 'Lilita One', cursive);
      font-size: clamp(32px, 7vw, 52px);
      color: rgba(245,221,213,0.6);
      transition: color 0.2s; padding: 8px 0;
      text-decoration: none;
    }
    .mobile-menu__link:hover { color: #F5DDD5; }
    .scroll-progress {
      position: fixed; top: 0; left: 0;
      height: 2px; width: 0%;
      background: #D9907A; z-index: 999;
      transition: width 0.1s linear;
      pointer-events: none;
    }
    @media (max-width: 600px) {
      .navi-hamburger { display: flex; }
      .navi-links { display: none !important; }
    }
  </style>
</head>
<body>

  <!-- ── Scroll progress ── -->
  <div class="scroll-progress" id="scrollProgress" role="progressbar" aria-label="Page scroll progress"></div>

  <!-- ── Nav ── -->
  <nav class="navi-nav" id="nav">
    <div class="navi-nav__left">
      <a href="index.html" class="navi-logo">
        <img src="brand/assets/logos/logo-navi-firstlight.png" alt="House of Navi" height="48">
      </a>
    </div>
    <div class="navi-links" id="naviLinks">
      <a href="index.html" class="navi-link is-current">Landing</a>
      <a href="projects.html" class="navi-link">Projects</a>
      <a href="get-involved.html" class="navi-link">Get Involved</a>
      <a href="about.html" class="navi-link">About</a>
      <a href="contact.html" class="navi-link">Contact</a>
    </div>
    <button class="navi-hamburger" id="naviHamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- ── Mobile menu ── -->
  <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <a href="index.html" class="mobile-menu__link">Landing</a>
    <a href="projects.html" class="mobile-menu__link">Projects</a>
    <a href="get-involved.html" class="mobile-menu__link">Get Involved</a>
    <a href="about.html" class="mobile-menu__link">About</a>
    <a href="contact.html" class="mobile-menu__link">Contact</a>
  </div>

<section id="landing" class="page-section">
    <div class="section-scrim"></div>
    <div class="section-vignette"></div>

    <div class="section-content">
      <h1 class="landing-title reveal">Stories can change the world.</h1>
      <p class="landing-tagline reveal reveal-delay-2">Making hope visible</p>
    </div>

    <p class="landing-footer reveal reveal-delay-3">EST · MMXXIV — AFRICA</p>
  </section>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(el => {
        if (el.isIntersecting) el.target.classList.add('is-visible');
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>

</body>
</html>

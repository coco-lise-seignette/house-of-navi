<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House of Navi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Baloo+2:wght@400;500;600;700;800&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navi-first-light:   #F5DDD5;
      --navi-clay-cream:    #EDE3D0;
      --navi-blood-dune:    #6B1A0E;
      --navi-midnight-dune: #280800;
      --ff-display: 'Lilita One', cursive;
      --ff-body:    'Baloo 2', sans-serif;
      --fs-cap: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--ff-body); background: var(--navi-midnight-dune); color: var(--navi-first-light); }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    /* ── Texture layers — fixed, never move ── */
    .texture-bg {
      position: fixed; inset: 0;
      background-image: url('brand/assets/textures/texture-terracotta.png');
      background-size: cover; background-position: center;
    }
    .texture-scrim {
      position: fixed; inset: 0;
      background: rgba(20, 4, 0, 0.55);
      mix-blend-mode: multiply;
    }
    .texture-vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 90% 70% at 50% 50%, transparent 30%, rgba(15,4,0,0.65) 100%);
      mix-blend-mode: multiply;
    }
    .grain-overlay {
      position: fixed; inset: 0; z-index: 5;
      pointer-events: none; opacity: 0.045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ── Fixed header ── */
    .fixed-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 24px; pointer-events: none;
    }
    .fixed-header > * { pointer-events: auto; }

    .navi-nav { display: flex; gap: clamp(20px, 2.5vw, 36px); align-items: center; }
    .navi-nav-link {
      font-family: var(--ff-body); font-size: var(--fs-cap); font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--navi-first-light); opacity: 0.6; transition: opacity 0.2s;
    }
    .navi-nav-link.is-active { opacity: 1; text-decoration: underline; text-underline-offset: 5px; }

    /* ── Support pill ── */
    .navi-pill {
      position: fixed; bottom: 24px; right: 24px; z-index: 100;
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 28px; border-radius: 100px;
      background: var(--navi-clay-cream); color: var(--navi-blood-dune);
      font-family: var(--ff-body); font-size: 13px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      box-shadow: 0 8px 28px rgba(40, 8, 0, 0.25);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .navi-pill:hover { transform: translateY(-1px); box-shadow: 0 12px 36px rgba(40, 8, 0, 0.35); }

    /* ── Footer ── */
    .landing-footer {
      position: fixed; bottom: clamp(28px, 4.5vh, 52px); left: 24px; z-index: 10;
      font-family: var(--ff-body); font-size: 11px; font-weight: 600;
      letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--navi-first-light); opacity: 0.3;
    }

    /* ── Hero shell ── */
    .hero {
      position: fixed; inset: 0; z-index: 10;
    }

    /* ── Hero centre — flex container for both states ── */
    .hero-centre {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Both states: same absolute position, never push each other ── */
    .state-1,
    .state-2 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      text-align: center;
      transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* State 1 starts fully visible */
    .state-1 { opacity: 1; }

    /* State 2 starts fully invisible */
    .state-2 { opacity: 0; }

    /* Cross-fade on class change */
    .hero-centre.title-exit .state-1 { opacity: 0; }
    .hero-centre.title-exit .state-2 { opacity: 1; }

    /* ── Wordmark (State 1) ── */
    .wordmark {
      display: flex; flex-direction: column; align-items: center;
      font-family: var(--ff-display); color: var(--navi-first-light);
      line-height: 0.92; letter-spacing: -0.005em;
    }
    .wordmark-house,
    .wordmark-navi { font-size: clamp(60px, 9.75vw, 132px); display: block; }
    .wordmark-of {
      font-size: clamp(20px, 2.4vw, 33px); display: block;
      letter-spacing: 0.18em; margin: clamp(3px, 0.5vw, 6px) 0; opacity: 0.9;
    }

    /* ── Headline (State 2) ── */
    .headline {
      font-family: var(--ff-display);
      font-size: clamp(44px, 6.5vw, 88px);
      color: var(--navi-first-light);
      line-height: 1.05;
      letter-spacing: -0.005em;
      padding: 0 clamp(24px, 6vw, 96px);
    }

    /* ── Tagline ornament — shared by both states ── */
    .tagline-ornament {
      display: flex; align-items: center; gap: 18px;
      margin-top: clamp(24px, 3.5vw, 40px);
      font-family: var(--ff-body); font-size: 11px; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--navi-first-light); opacity: 0.5; white-space: nowrap;
      justify-content: center;
    }
    .tagline-ornament::before,
    .tagline-ornament::after {
      content: ''; display: block; width: 56px; height: 1px;
      background: var(--navi-first-light); opacity: 0.4; flex-shrink: 0;
    }

    /* ── Mobile ── */
    @media (max-width: 767px) {
      .navi-nav { gap: 14px; }
      .navi-nav-link { font-size: 10px; }
      .navi-pill { padding: 12px 20px; font-size: 12px; }
    }

    /* ── New nav (overrides old rules) ── */
    .navi-nav {
      position: fixed !important;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex !important;
      justify-content: space-between;
      align-items: center;
      padding: clamp(20px, 3vh, 28px) clamp(24px, 5vw, 64px);
      transition: transform 0.3s ease, background 0.3s ease;
      gap: 0 !important;
    }
    .navi-nav.nav-hidden { transform: translateY(-100%); }
    .navi-nav.is-scrolled {
      background: rgba(8, 2, 0, 0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .navi-nav__left { display: flex; align-items: center; }
    .navi-links {
      display: flex;
      gap: clamp(20px, 2vw, 36px);
      align-items: center;
    }
    .navi-link {
      font-family: var(--ff-body, 'Baloo 2', sans-serif);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #F5DDD5;
      opacity: 0.55;
      transition: opacity 0.2s;
      text-decoration: none;
    }
    .navi-link:hover { opacity: 1; }
    .navi-link.is-current { opacity: 1; text-decoration: underline; text-underline-offset: 5px; }
    .navi-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }
    .navi-hamburger span {
      display: block; width: 22px; height: 1.5px;
      background: #F5DDD5;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }
    .navi-hamburger.is-open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .navi-hamburger.is-open span:nth-child(2) { opacity: 0; }
    .navi-hamburger.is-open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
    .mobile-menu {
      position: fixed; inset: 0; z-index: 90;
      background: rgba(10,2,0,0.97);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .mobile-menu.is-open { opacity: 1; pointer-events: all; }
    .mobile-menu__link {
      font-family: var(--ff-display, 'Lilita One', cursive);
      font-size: clamp(32px, 7vw, 52px);
      color: rgba(245,221,213,0.6);
      transition: color 0.2s; padding: 8px 0;
      text-decoration: none;
    }
    .mobile-menu__link:hover { color: #F5DDD5; }
    .scroll-progress {
      position: fixed; top: 0; left: 0;
      height: 2px; width: 0%;
      background: #D9907A; z-index: 999;
      transition: width 0.1s linear;
      pointer-events: none;
    }
    @media (max-width: 600px) {
      .navi-hamburger { display: flex; }
      .navi-links { display: none !important; }
    }
  </style>
</head>
<body>

  <!-- ── Scroll progress ── -->
  <div class="scroll-progress" id="scrollProgress" role="progressbar" aria-label="Page scroll progress"></div>

  <!-- ── Nav ── -->
  <nav class="navi-nav" id="nav">
    <div class="navi-nav__left">
      <a href="index.html" class="navi-logo">
        <img src="brand/assets/logos/logo-navi-firstlight.png" alt="House of Navi" height="48">
      </a>
    </div>
    <div class="navi-links" id="naviLinks">
      <a href="index.html" class="navi-link is-current">Landing</a>
      <a href="projects.html" class="navi-link">Projects</a>
      <a href="get-involved.html" class="navi-link">Get Involved</a>
      <a href="about.html" class="navi-link">About</a>
      <a href="contact.html" class="navi-link">Contact</a>
    </div>
    <button class="navi-hamburger" id="naviHamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- ── Mobile menu ── -->
  <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <a href="index.html" class="mobile-menu__link">Landing</a>
    <a href="projects.html" class="mobile-menu__link">Projects</a>
    <a href="get-involved.html" class="mobile-menu__link">Get Involved</a>
    <a href="about.html" class="mobile-menu__link">About</a>
    <a href="contact.html" class="mobile-menu__link">Contact</a>
  </div>

  <!-- Texture layers — fixed, untouched by animation -->
  <div class="texture-bg"></div>
  <div class="texture-scrim"></div>
  <div class="texture-vignette"></div>
  <div class="grain-overlay"></div>

  <a href="get-involved.html#donate" class="navi-pill"><span>♥</span> Support</a>

  <p class="landing-footer">EST · MMXXIV — AFRICA</p>

  <!-- Hero shell -->
  <div class="hero">
    <div class="hero-centre" id="hero-centre">

      <!-- STATE 1: visible on load, fades out after 4s -->
      <div class="state-1">
        <div class="wordmark">
          <span class="wordmark-house">HOUSE</span>
          <span class="wordmark-of">OF</span>
          <span class="wordmark-navi">NAVI</span>
        </div>
        <div class="tagline-ornament">MAKING HOPE VISIBLE.</div>
      </div>

      <!-- STATE 2: invisible on load, fades in after 4s -->
      <div class="state-2">
        <h1 class="headline">Stories can change the world.</h1>
        <div class="tagline-ornament">MAKING HOPE VISIBLE.</div>
      </div>

    </div>
  </div>

  <script>
    setTimeout(function () {
      document.getElementById('hero-centre').classList.add('title-exit');
    }, 4000);
  </script>

</body>
</html>
